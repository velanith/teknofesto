<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Knowledge Graph</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#ffffff;--bg2:#f5f4f0;--bg3:#eeedea;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9c9a92;
  --bd:#e0dfd8;--bd2:#c8c7bf;--r:8px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1a1a18;--bg2:#232320;--bg3:#2a2a27;--text:#e8e6de;--text2:#a8a69e;--text3:#6b6b67;--bd:#2e2e2b;--bd2:#3d3d3a;}
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;}

/* Access */
#access-screen{display:flex;align-items:center;justify-content:center;height:100dvh;padding:20px;}
.access-box{width:min(340px,100%);}
.access-title{font-size:22px;font-weight:700;margin-bottom:6px;}
.access-sub{font-size:12px;color:var(--text3);font-family:monospace;margin-bottom:18px;}
.access-form{display:flex;gap:8px;}
.access-form input{
  flex:1;min-width:0;font-size:14px;padding:9px 10px;
  border:1px solid var(--bd2);border-radius:var(--r);
  background:var(--bg2);color:var(--text);
}
.access-form button{
  font-size:12px;padding:9px 14px;border-radius:var(--r);
  cursor:pointer;background:var(--text);color:var(--bg);border:none;font-weight:600;
}
.access-error{min-height:18px;margin-top:8px;font-size:11px;color:#e24b4a;font-family:monospace;}

/* App */
#app{display:none;flex-direction:column;height:100dvh;}
#toolbar{
  display:flex;align-items:center;gap:8px;
  padding:9px 14px;border-bottom:1px solid var(--bd);
  background:var(--bg);
}
#toolbar h2{font-size:12px;font-weight:500;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;flex:1;}
#user-picker{
  display:flex;align-items:center;gap:6px;
  padding:3px 8px;border-radius:20px;border:1px solid var(--bd2);
}
.user-choice{
  width:16px;height:16px;border-radius:50%;cursor:pointer;
  border:2px solid var(--bg);box-shadow:0 0 0 1px var(--bd2);
  transition:transform .15s,box-shadow .15s;
}
.user-choice:hover{transform:scale(1.12);}
.user-choice.active{box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--choice-color,#888);}
.tb-btn{
  font-size:12px;padding:5px 11px;background:transparent;
  border:1px solid var(--bd2);border-radius:var(--r);
  color:var(--text2);cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:5px;
}
.tb-btn:hover{background:var(--bg2);color:var(--text);}
#live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

#main{display:flex;flex:1;overflow:hidden;}
#graph-area{flex:1;position:relative;overflow:hidden;}
svg#graph{width:100%;height:100%;cursor:grab;}
svg#graph:active{cursor:grabbing;}
.glink{stroke:var(--bd2);stroke-width:1.2;fill:none;opacity:.65;}
.glabel{font-size:10px;fill:var(--text3);font-family:monospace;pointer-events:none;}
.gnode rect{stroke-width:1.5;cursor:pointer;}
.gnode.selected rect{stroke-width:3;filter:drop-shadow(0 0 8px var(--glow,#888));}
.gnode.link-source rect{stroke-width:3;stroke-dasharray:5 3;}
.gnode text{font-size:11px;font-weight:600;pointer-events:none;user-select:none;}

/* Panel */
#panel{width:0;overflow:hidden;border-left:1px solid var(--bd);background:var(--bg);transition:width .22s;display:flex;flex-direction:column;}
#panel.open{width:300px;}
#panel-header{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--bd);min-width:300px;}
#panel-title{font-size:14px;font-weight:600;}
#panel-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text3);line-height:1;}
#panel-close:hover{color:var(--text);}
#panel-content{flex:1;overflow-y:auto;padding:16px;min-width:300px;}
#panel-content h1{font-size:20px;font-weight:700;margin-bottom:10px;line-height:1.3;}
#panel-content h2{font-size:16px;font-weight:700;margin:14px 0 6px;}
#panel-content h3{font-size:14px;font-weight:600;margin:10px 0 4px;}
#panel-content p{font-size:13px;line-height:1.65;color:var(--text2);margin-bottom:8px;}
#panel-content ul,#panel-content ol{font-size:13px;line-height:1.65;color:var(--text2);margin:0 0 8px 16px;}
#panel-content code{font-family:monospace;font-size:11px;background:var(--bg2);padding:1px 5px;border-radius:3px;}
#panel-content pre{background:var(--bg2);border-radius:var(--r);padding:10px;overflow-x:auto;margin-bottom:8px;}
#panel-content pre code{background:none;padding:0;}
#panel-content blockquote{border-left:3px solid var(--bd2);padding-left:10px;margin:0 0 8px;color:var(--text3);font-style:italic;}
#panel-content strong{color:var(--text);font-weight:700;}
#panel-content hr{border:none;border-top:1px solid var(--bd);margin:12px 0;}
#panel-content table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px;}
#panel-content th,#panel-content td{padding:5px 8px;border:1px solid var(--bd);text-align:left;}
#panel-content th{background:var(--bg2);font-weight:600;}
.tag-chip{display:inline-block;font-size:10px;padding:2px 9px;border-radius:20px;margin:0 4px 10px 0;font-family:monospace;border:1px solid;}
.author-chip{display:inline-flex;align-items:center;gap:5px;font-size:10px;padding:2px 9px;border-radius:20px;margin-bottom:12px;font-family:monospace;border:1px solid var(--bd2);color:var(--text3);}
.author-chip-dot{width:8px;height:8px;border-radius:50%;}
.related-block{margin-top:14px;padding-top:12px;border-top:1px solid var(--bd);}
.related-block p{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.06em;margin-bottom:6px;}
.related-link{display:block;font-size:12px;color:#185FA5;padding:3px 0;cursor:pointer;}
.related-link:hover{text-decoration:underline;}
.link-tools{margin-top:14px;padding-top:12px;border-top:1px solid var(--bd);display:flex;gap:8px;flex-wrap:wrap;}
.link-btn{font-size:11px;color:var(--text);background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);padding:4px 12px;cursor:pointer;}
.link-btn:hover{background:var(--bg3);}
.link-btn.cancel{color:#e24b4a;border-color:#f09595;background:transparent;}
.link-btn.cancel:hover{background:#fcebeb;}
.panel-del{margin-top:14px;padding-top:12px;border-top:1px solid var(--bd);}
.del-btn{font-size:11px;color:#e24b4a;background:none;border:1px solid #f09595;border-radius:var(--r);padding:4px 12px;cursor:pointer;}
.del-btn:hover{background:#fcebeb;}

#hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--text3);pointer-events:none;font-family:monospace;white-space:nowrap;}
#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3);font-family:monospace;background:var(--bg);}

/* Add modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center;}
.modal-bg.show{display:flex;}
.modal-box{background:var(--bg);border-radius:12px;border:1px solid var(--bd);padding:22px 24px;width:380px;max-width:94vw;}
.modal-box h3{font-size:15px;font-weight:600;margin-bottom:14px;}
.modal-box label{font-size:11px;color:var(--text3);font-family:monospace;display:block;margin-bottom:4px;}
.modal-box input,.modal-box textarea{
  width:100%;font-size:13px;padding:8px 10px;
  border:1px solid var(--bd2);border-radius:var(--r);
  background:var(--bg2);color:var(--text);margin-bottom:12px;
  font-family:inherit;
}
.modal-box textarea{height:120px;resize:vertical;font-family:monospace;font-size:12px;}
.md-tools{display:flex;justify-content:flex-end;margin:-2px 0 8px;}
.hidden-file{display:none;}
.file-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.file-row input{display:none;}
.file-name{font-size:11px;color:var(--text3);font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.combo-row{display:flex;gap:8px;margin-bottom:8px;}
.combo-row input{margin-bottom:0;}
.combo-row button{flex:0 0 auto;}
.selected-links{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;min-height:22px;}
.selected-link{
  display:inline-flex;align-items:center;gap:5px;
  max-width:100%;font-size:11px;padding:3px 8px;border-radius:20px;
  border:1px solid var(--bd2);background:var(--bg2);color:var(--text2);
}
.selected-link span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.selected-link button{border:none;background:none;color:var(--text3);cursor:pointer;font-size:14px;line-height:1;}
.selected-link button:hover{color:var(--text);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;}
.btn-primary{font-size:12px;padding:6px 16px;border-radius:var(--r);cursor:pointer;background:var(--text);color:var(--bg);border:none;font-weight:600;}
.btn-sec{font-size:12px;padding:6px 14px;border-radius:var(--r);cursor:pointer;background:transparent;color:var(--text2);border:1px solid var(--bd2);}

/* Note page */
#note-page{display:none;height:100dvh;overflow-y:auto;background:var(--bg);}
#note-page.open{display:block;}
.note-shell{width:min(860px,calc(100vw - 32px));margin:0 auto;padding:24px 0 56px;}
.note-top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding-bottom:18px;border-bottom:1px solid var(--bd);}
.note-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
.note-back{font-size:12px;color:var(--text2);text-decoration:none;border:1px solid var(--bd2);border-radius:var(--r);padding:6px 12px;display:inline-flex;align-items:center;gap:6px;}
.note-back:hover{background:var(--bg2);color:var(--text);}
.note-open-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.note-open-title{font-size:34px;line-height:1.15;margin:28px 0 12px;letter-spacing:0;}
.note-body{font-size:16px;line-height:1.75;color:var(--text2);}
.note-body img{max-width:100%;height:auto;border-radius:var(--r);border:1px solid var(--bd);margin:10px 0;}
.note-body h1{font-size:30px;line-height:1.2;color:var(--text);margin:20px 0 12px;}
.note-body h2{font-size:22px;line-height:1.25;color:var(--text);margin:24px 0 10px;}
.note-body h3{font-size:18px;line-height:1.3;color:var(--text);margin:18px 0 8px;}
.note-body p,.note-body ul,.note-body ol{margin-bottom:12px;}
.note-body ul,.note-body ol{padding-left:22px;}
.note-body code{font-family:monospace;font-size:.9em;background:var(--bg2);padding:2px 5px;border-radius:4px;color:var(--text);}
.note-body pre{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:12px;overflow:auto;margin-bottom:14px;}
.note-body pre code{background:none;padding:0;}
.note-body blockquote{border-left:3px solid var(--bd2);padding-left:12px;margin:0 0 14px;color:var(--text3);}
.note-body table{width:100%;border-collapse:collapse;font-size:14px;margin-bottom:14px;}
.note-body th,.note-body td{padding:7px 10px;border:1px solid var(--bd);text-align:left;}
.note-related{margin-top:28px;padding-top:18px;border-top:1px solid var(--bd);}
.note-related-title{font-size:11px;color:var(--text3);font-family:monospace;font-weight:700;letter-spacing:.06em;margin-bottom:8px;}
.note-related a{display:block;color:#185FA5;text-decoration:none;font-size:14px;padding:5px 0;}
.note-related a:hover{text-decoration:underline;}
.note-edit{display:none;margin-top:24px;}
.note-edit.open{display:block;}
.note-edit label{font-size:11px;color:var(--text3);font-family:monospace;display:block;margin-bottom:4px;}
.note-edit input,.note-edit textarea{
  width:100%;font-size:14px;padding:9px 10px;
  border:1px solid var(--bd2);border-radius:var(--r);
  background:var(--bg2);color:var(--text);margin-bottom:12px;font-family:inherit;
}
.note-edit textarea{min-height:420px;resize:vertical;font-family:monospace;font-size:13px;line-height:1.55;}
.note-edit-actions{display:flex;gap:8px;justify-content:flex-end;}
</style>
</head>
<body>

<!-- ── ACCESS SCREEN ── -->
<div id="access-screen">
  <div class="access-box">
    <div class="access-title">Knowledge Graph</div>
    <div class="access-sub">ortak şifre ile giriş</div>
    <form class="access-form" id="access-form">
      <input id="access-pass" type="password" autocomplete="current-password" placeholder="şifre" />
      <button type="submit">Gir</button>
    </form>
    <div class="access-error" id="access-error"></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div id="toolbar">
    <h2>Knowledge Graph</h2>
    <div id="user-picker" aria-label="Kullanıcı seç"></div>
    <div id="live-dot" title="canlı bağlantı"></div>
    <button class="tb-btn" id="reset-layout-btn" title="Dizilimi sıfırla"><i class="ti ti-layout-board-split"></i></button>
    <button class="tb-btn" id="add-btn"><i class="ti ti-plus"></i> Yeni not</button>
    <button class="tb-btn" id="logout-btn" title="Çıkış"><i class="ti ti-logout"></i></button>
  </div>
  <div id="main">
    <div id="graph-area">
      <svg id="graph"></svg>
      <div id="loading">yükleniyor…</div>
      <div id="hint">tıkla → içerik · sürükle → konum · scroll → zoom</div>
    </div>
    <div id="panel">
      <div id="panel-header">
        <span id="panel-title"></span>
        <button id="panel-close">×</button>
      </div>
      <div id="panel-content"></div>
    </div>
  </div>
</div>

<!-- ── FULL NOTE PAGE ── -->
<div id="note-page">
  <div class="note-shell">
    <div class="note-top">
      <a class="note-back" id="note-back" href="./index.html"><i class="ti ti-arrow-left"></i> Grafa dön</a>
      <div class="note-actions">
        <div class="note-open-meta" id="note-open-meta"></div>
        <button class="btn-sec" id="note-edit-btn" type="button"><i class="ti ti-pencil"></i> Düzenle</button>
      </div>
    </div>
    <div id="note-view">
      <h1 class="note-open-title" id="note-open-title"></h1>
      <div class="note-body" id="note-open-body"></div>
      <div class="note-related" id="note-open-related"></div>
    </div>
    <div class="note-edit" id="note-edit">
      <label>Başlık</label>
      <input id="note-edit-title" />
      <label>Etiket</label>
      <input id="note-edit-tag" />
      <label>İçerik (markdown)</label>
      <div class="md-tools">
        <button class="btn-sec" id="note-image-btn" type="button"><i class="ti ti-photo-plus"></i> Görsel ekle</button>
        <input class="hidden-file" id="note-image" type="file" accept="image/*" />
      </div>
      <textarea id="note-edit-body"></textarea>
      <div class="note-edit-actions">
        <button class="btn-sec" id="note-edit-cancel" type="button">İptal</button>
        <button class="btn-primary" id="note-edit-save" type="button">Kaydet</button>
      </div>
    </div>
  </div>
</div>

<!-- ── ADD NODE MODAL ── -->
<div class="modal-bg" id="add-modal">
  <div class="modal-box">
    <h3>Yeni Not</h3>
    <label>Markdown dosyası</label>
    <div class="file-row">
      <button class="btn-sec" id="m-file-btn" type="button"><i class="ti ti-file-import"></i> MD seç</button>
      <span class="file-name" id="m-file-name"></span>
      <input id="m-file" type="file" accept=".md,.markdown,text/markdown,text/plain" />
    </div>
    <label>Başlık</label>
    <input id="m-title" placeholder="notun adı" />
    <label>Etiket</label>
    <input id="m-tag" placeholder="proje, fikir, kişi, kaynak…" />
    <label>Bağlantılar</label>
    <div class="combo-row">
      <input id="m-link-combo" list="node-title-options" placeholder="mevcut notlardan seç" />
      <button class="btn-sec" id="m-link-add" type="button"><i class="ti ti-plus"></i> Ekle</button>
    </div>
    <datalist id="node-title-options"></datalist>
    <div class="selected-links" id="m-selected-links"></div>
    <label>İçerik (markdown)</label>
    <div class="md-tools">
      <button class="btn-sec" id="m-image-btn" type="button"><i class="ti ti-photo-plus"></i> Görsel ekle</button>
      <input class="hidden-file" id="m-image" type="file" accept="image/*" />
    </div>
    <textarea id="m-body" placeholder="**kalın**, *italic*, ## başlık, \`kod\`, - liste"></textarea>
    <div class="modal-actions">
      <button class="btn-sec" id="m-cancel">İptal</button>
      <button class="btn-primary" id="m-save">Kaydet</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const SUPABASE_URL  = 'https://unxyujcyomzjfpzksbjf.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVueHl1amN5b216amZwemtzYmpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTcyNTgsImV4cCI6MjA5NDA3MzI1OH0.5kHixsH8YUBMrV-CxqaJ5VmiXmWKrQOZW2Ycr0KtPLE';
const AUTH_EMAIL    = 'teknofesto@example.com';

// 5 kullanıcı — isim ve renk kodunu değiştir
const USERS = [
  { name: 'emre', color: '#534AB7', bg: '#EEEDFE', text: '#3C3489', code: 'mor2025'   },
  { name: 'ata efe', color: '#0F6E56', bg: '#E1F5EE', text: '#085041', code: 'yesil2025' },
  { name: 'sinem', color: '#854F0B', bg: '#FAEEDA', text: '#633806', code: 'sari2025'  },
  { name: 'fatma', color: '#185FA5', bg: '#E6F1FB', text: '#0C447C', code: 'mavi2025'  },
  { name: 'nisa', color: '#993556', bg: '#FBEAF0', text: '#72243E', code: 'pembe2025' },
];
// ────────────────────────────────────────────────────────

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let currentUser = null;
let nodes = [], edges = [], simulation;
let svgSel, gSel, linkSel, nodeSel;
let selectedId = null;
let linkModeSource = null;
let modalLinks = [];
let notePageMode = false;
let currentNotePageId = null;
const NODE_W = 120;
const NODE_H = 44;
const LAYOUT_KEY = 'kg-node-positions-v1';
let appStarted = false;

function showApp() {
  if (appStarted) return;
  appStarted = true;
  document.getElementById('access-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  initUserPicker();
  initGraph();
}

document.getElementById('access-form').addEventListener('submit', async e => {
  e.preventDefault();
  const input = document.getElementById('access-pass');
  const error = document.getElementById('access-error');
  error.textContent = '';

  const { error: authError } = await sb.auth.signInWithPassword({
    email: AUTH_EMAIL,
    password: input.value,
  });

  if (authError) {
    error.textContent = 'şifre yanlış veya auth hesabı hazır değil';
    input.value = '';
    input.focus();
    return;
  }
  showApp();
});

(async function initAccess() {
  const { data } = await sb.auth.getSession();
  if (data.session) {
    showApp();
    return;
  }
  document.getElementById('access-pass').focus();
})();

document.getElementById('logout-btn').addEventListener('click', async () => {
  await sb.auth.signOut();
  location.href = graphUrl();
});

sb.auth.onAuthStateChange((_event, session) => {
  if (session) {
    showApp();
  }
});

// ── USER PICKER ─────────────────────────────────────────
function setCurrentUser(user) {
  currentUser = user;
  localStorage.setItem('kg-current-user', user.code);
  document.querySelectorAll('.user-choice').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.code === user.code);
  });
}

function initUserPicker() {
  const picker = document.getElementById('user-picker');
  const savedCode = localStorage.getItem('kg-current-user');
  currentUser = USERS.find(u => u.code === savedCode) || USERS[0];

  USERS.forEach(u => {
    const btn = document.createElement('button');
    btn.className = 'user-choice';
    btn.type = 'button';
    btn.dataset.code = u.code;
    btn.title = u.name;
    btn.style.background = u.color;
    btn.style.setProperty('--choice-color', u.color);
    btn.addEventListener('click', () => setCurrentUser(u));
    picker.appendChild(btn);
  });

  setCurrentUser(currentUser);
}

// ── SUPABASE HELPERS ─────────────────────────────────────
async function fetchAll() {
  const [{ data: n }, { data: e }] = await Promise.all([
    sb.from('nodes').select('*').order('created_at'),
    sb.from('edges').select('*').order('created_at'),
  ]);
  return { nodes: n || [], edges: e || [] };
}

function relatedTitles(title) {
  return edges.reduce((acc, e) => {
    if (e.source === title) acc.push(e.target);
    else if (e.target === title) acc.push(e.source);
    return acc;
  }, []);
}

function noteUrl(id) {
  const base = location.href.split('?')[0].split('#')[0];
  return `${base}?note=${encodeURIComponent(id)}`;
}

function graphUrl() {
  return location.href.split('?')[0].split('#')[0];
}

function loadPositions() {
  try {
    return JSON.parse(localStorage.getItem(LAYOUT_KEY) || '{}');
  } catch {
    return {};
  }
}

function saveNodePosition(d) {
  if (!d?.id || !Number.isFinite(d.x) || !Number.isFinite(d.y)) return;
  const positions = loadPositions();
  positions[d.id] = { x: d.x, y: d.y };
  localStorage.setItem(LAYOUT_KEY, JSON.stringify(positions));
}

function applySavedPosition(node, positions) {
  const pos = positions[node.id];
  if (!pos) return node;
  return { ...node, x: pos.x, y: pos.y, fx: pos.x, fy: pos.y };
}

// ── GRAPH INIT ───────────────────────────────────────────
async function initGraph() {
  const data = await fetchAll();
  const positions = loadPositions();
  nodes = data.nodes.map(n => applySavedPosition(n, positions));
  edges = data.edges;

  const noteId = new URLSearchParams(location.search).get('note');
  if (noteId) {
    notePageMode = true;
    renderNotePage(noteId);
    return;
  }

  document.getElementById('loading').style.display = 'none';
  renderNodeTitleOptions();
  buildGraph();
  subscribeRealtime();
}

function buildGraph() {
  const area = document.getElementById('graph-area');
  const W = area.clientWidth, H = area.clientHeight;

  svgSel = d3.select('#graph');
  svgSel.selectAll('*').remove();
  gSel = svgSel.append('g');

  svgSel.call(
    d3.zoom().scaleExtent([.2, 4])
      .on('zoom', e => gSel.attr('transform', e.transform))
  );

  const linkData = edges.map(e => ({ ...e }));
  const nodeData = nodes.map(n => ({ ...n }));

  simulation = d3.forceSimulation(nodeData)
    .force('link', d3.forceLink(linkData).id(d => d.title).distance(150))
    .force('charge', d3.forceManyBody().strength(-380))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide(76));

  linkSel = gSel.append('g').selectAll('line')
    .data(linkData).join('line').attr('class', 'glink');

  const labelSel = gSel.append('g').selectAll('text')
    .data(linkData).join('text')
    .attr('class', 'glabel').attr('text-anchor', 'middle')
    .text(d => d.label || '');

  nodeSel = gSel.append('g').selectAll('g')
    .data(nodeData).join('g')
    .attr('class', 'gnode')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end',   (e, d) => {
        if (!e.active) simulation.alphaTarget(0);
        d.fx = d.x;
        d.fy = d.y;
        saveNodePosition(d);
      })
    )
    .on('click', (e, d) => {
      e.stopPropagation();
      if (linkModeSource) {
        addEdgeFromSource(d);
        return;
      }
      openPanel(d);
    });

  nodeSel.append('rect')
    .attr('x', -NODE_W / 2)
    .attr('y', -NODE_H / 2)
    .attr('width', NODE_W)
    .attr('height', NODE_H)
    .attr('rx', 4)
    .attr('ry', 4)
    .attr('fill',   d => userOf(d.author_code).bg)
    .attr('stroke', d => userOf(d.author_code).color)
    .attr('stroke-width', 1.5);

  nodeSel.append('text')
    .attr('text-anchor', 'middle').attr('dy', '0.35em')
    .style('fill',        d => userOf(d.author_code).text)
    .style('font-size',   '11px').style('font-weight', '600')
    .text(d => truncateTitle(d.title));

  simulation.on('tick', () => {
    linkSel.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    labelSel.attr('x', d => (d.source.x + d.target.x) / 2)
             .attr('y', d => (d.source.y + d.target.y) / 2 - 6);
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  svgSel.on('click', () => {
    if (!linkModeSource) closePanel();
  });

  // restore selected
  if (selectedId) {
    const n = nodeData.find(x => x.id === selectedId);
    if (n) openPanel(n);
  }
  updateNodeStates();
}

function userOf(code) {
  return USERS.find(u => u.code === code) || USERS[0];
}

function truncateTitle(title) {
  return title.length > 15 ? title.slice(0, 14) + '…' : title;
}

// ── REALTIME ─────────────────────────────────────────────
function subscribeRealtime() {
  sb.channel('kg-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'nodes' }, refresh)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'edges' }, refresh)
    .subscribe();
}

async function refresh() {
  if (notePageMode) return;
  const data = await fetchAll();
  // preserve positions
  const posMap = loadPositions();
  if (nodeSel) nodeSel.each(d => { posMap[d.id] = { x: d.x, y: d.y }; });
  nodes = data.nodes.map(n => applySavedPosition(n, posMap));
  edges = data.edges;
  renderNodeTitleOptions();
  buildGraph();
}

function renderNotePage(noteId) {
  currentNotePageId = noteId;
  document.getElementById('app').style.display = 'none';
  document.getElementById('add-modal').classList.remove('show');
  const page = document.getElementById('note-page');
  const note = nodes.find(n => String(n.id) === String(noteId));

  document.getElementById('note-view').style.display = 'block';
  document.getElementById('note-edit').classList.remove('open');
  document.getElementById('note-back').href = graphUrl();
  page.classList.add('open');
  document.body.style.overflow = 'auto';

  if (!note) {
    document.getElementById('note-edit-btn').style.display = 'none';
    document.getElementById('note-open-meta').innerHTML = '';
    document.getElementById('note-open-title').textContent = 'Not bulunamadi';
    document.getElementById('note-open-body').innerHTML = '<p>Bu not silinmis veya URL gecersiz olabilir.</p>';
    document.getElementById('note-open-related').innerHTML = '';
    document.title = 'Not bulunamadi';
    return;
  }

  document.getElementById('note-edit-btn').style.display = 'inline-flex';
  const u = userOf(note.author_code);
  const tagHtml = note.tag
    ? `<span class="tag-chip" style="background:${u.bg};color:${u.text};border-color:${u.color}">${escapeHtml(note.tag)}</span>`
    : '';
  const authorHtml = `<span class="author-chip"><span class="author-chip-dot" style="background:${u.color}"></span>${escapeHtml(u.name)}</span>`;
  const rel = relatedTitles(note.title)
    .map(title => nodes.find(n => n.title === title))
    .filter(Boolean);

  document.getElementById('note-open-meta').innerHTML = tagHtml + authorHtml;
  document.getElementById('note-open-title').textContent = note.title;
  document.getElementById('note-open-body').innerHTML = marked.parse(note.content || '');
  document.getElementById('note-open-related').innerHTML = rel.length
    ? `<div class="note-related-title">BAĞLANTILI NOTLAR</div>${rel.map(n => `<a href="${noteUrl(n.id)}">→ ${escapeHtml(n.title)}</a>`).join('')}`
    : '';
  document.title = `${note.title} · Knowledge Graph`;
}

// ── PANEL ────────────────────────────────────────────────
function openPanel(d) {
  selectedId = d.id;
  const u = userOf(d.author_code);
  document.querySelector('#graph-area svg').style.setProperty('--glow', u.color);

  document.getElementById('panel-title').textContent = d.title;
  updateNodeStates();

  const tagHtml = d.tag
    ? `<span class="tag-chip" style="background:${u.bg};color:${u.text};border-color:${u.color}">${d.tag}</span>`
    : '';
  const authorHtml = `<span class="author-chip"><span class="author-chip-dot" style="background:${u.color}"></span>${u.name}</span>`;
  const body = marked.parse(d.content || '');
  const rel  = relatedTitles(d.title);
  const relHtml = rel.length
    ? `<div class="related-block"><p>BAĞLANTILI NOTLAR</p>${rel.map(t => `<span class="related-link" onclick="openByTitle('${t.replace(/'/g,"\\'")}')">→ ${t}</span>`).join('')}</div>`
    : '';
  const openHtml = `<div class="link-tools"><button class="link-btn" onclick="openNotePage('${d.id}')"><i class="ti ti-external-link"></i> Yeni sayfada aç</button></div>`;
  const linkHtml = linkModeSource?.id === d.id
    ? `<div class="link-tools"><button class="link-btn cancel" onclick="cancelLinkMode()">İptal</button></div>`
    : `<div class="link-tools"><button class="link-btn" onclick="startLinkMode('${d.id}')"><i class="ti ti-link"></i> Bu nota bağlantı ekle</button></div>`;

  const canDelete = currentUser && currentUser.code === d.author_code;
  const delHtml = canDelete
    ? `<div class="panel-del"><button class="del-btn" onclick="deleteNode('${d.id}','${d.title.replace(/'/g,"\\'")}')"><i class="ti ti-trash"></i> Bu notu sil</button></div>`
    : '';

  document.getElementById('panel-content').innerHTML = tagHtml + authorHtml + body + openHtml + linkHtml + relHtml + delHtml;
  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  cancelLinkMode(false);
  document.getElementById('panel').classList.remove('open');
  selectedId = null;
  updateNodeStates();
}
document.getElementById('panel-close').addEventListener('click', closePanel);

window.openByTitle = function(title) {
  if (!nodeSel) return;
  nodeSel.each(d => { if (d.title === title) openPanel(d); });
};

window.openNotePage = function(id) {
  window.open(noteUrl(id), '_blank');
};

document.getElementById('note-edit-btn').addEventListener('click', () => {
  const note = nodes.find(n => String(n.id) === String(currentNotePageId));
  if (!note) return;
  document.getElementById('note-view').style.display = 'none';
  document.getElementById('note-edit').classList.add('open');
  document.getElementById('note-edit-title').value = note.title || '';
  document.getElementById('note-edit-tag').value = note.tag || '';
  document.getElementById('note-edit-body').value = note.content || '';
  document.getElementById('note-edit-body').focus();
});

document.getElementById('note-edit-cancel').addEventListener('click', () => {
  document.getElementById('note-edit').classList.remove('open');
  document.getElementById('note-view').style.display = 'block';
});

document.getElementById('note-edit-save').addEventListener('click', async () => {
  const note = nodes.find(n => String(n.id) === String(currentNotePageId));
  if (!note) return;

  const title = document.getElementById('note-edit-title').value.trim();
  const tag = document.getElementById('note-edit-tag').value.trim();
  const content = document.getElementById('note-edit-body').value.trim();
  if (!title) return;

  const oldTitle = note.title;
  const { data: updated, error } = await sb.from('nodes')
    .update({ title, tag, content })
    .eq('id', note.id)
    .select()
    .single();
  if (error) {
    alert('Not kaydedilemedi.');
    return;
  }

  if (oldTitle !== title) {
    await Promise.all([
      sb.from('edges').update({ source: title }).eq('source', oldTitle),
      sb.from('edges').update({ target: title }).eq('target', oldTitle),
    ]);
  }

  const data = await fetchAll();
  const positions = loadPositions();
  nodes = data.nodes.map(n => applySavedPosition(n, positions));
  edges = data.edges;
  currentNotePageId = updated.id;
  history.replaceState(null, '', noteUrl(updated.id));
  renderNotePage(updated.id);
});

function updateNodeStates() {
  if (!nodeSel) return;
  nodeSel
    .classed('selected', d => d.id === selectedId)
    .classed('link-source', d => linkModeSource && d.id === linkModeSource.id);
}

window.startLinkMode = function(id) {
  const source = nodes.find(n => n.id === id);
  if (!source) return;
  linkModeSource = source;
  selectedId = source.id;
  document.getElementById('hint').textContent = `"${source.title}" için bağlanacak notu seç · iptal için paneldeki buton`;
  updateNodeStates();
  openPanel(source);
};

window.cancelLinkMode = function(redraw = true) {
  linkModeSource = null;
  document.getElementById('hint').textContent = 'tıkla → içerik · sürükle → konum · scroll → zoom';
  updateNodeStates();
  if (redraw && selectedId) {
    const selected = nodes.find(n => n.id === selectedId);
    if (selected && document.getElementById('panel').classList.contains('open')) openPanel(selected);
  }
};

async function addEdgeFromSource(target) {
  if (!linkModeSource || target.id === linkModeSource.id) return;
  const sourceTitle = linkModeSource.title;
  const targetTitle = target.title;
  const exists = edges.some(e =>
    (e.source === sourceTitle && e.target === targetTitle) ||
    (e.source === targetTitle && e.target === sourceTitle)
  );

  if (!exists) {
    await sb.from('edges').insert({ source: sourceTitle, target: targetTitle, label: '' });
  }

  const source = linkModeSource;
  cancelLinkMode(false);
  openPanel(source);
  refresh();
}

// ── ADD NODE ─────────────────────────────────────────────
document.getElementById('reset-layout-btn').addEventListener('click', () => {
  localStorage.removeItem(LAYOUT_KEY);
  nodes = nodes.map(n => ({ ...n, x: undefined, y: undefined, fx: null, fy: null }));
  closePanel();
  buildGraph();
});

document.getElementById('add-btn').addEventListener('click', () => {
  renderNodeTitleOptions();
  document.getElementById('add-modal').classList.add('show');
  document.getElementById('m-title').focus();
});
document.getElementById('m-cancel').addEventListener('click', () => {
  closeAddModal();
});

document.getElementById('m-file-btn').addEventListener('click', () => {
  document.getElementById('m-file').click();
});

document.getElementById('m-file').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  const content = await file.text();
  const titleEl = document.getElementById('m-title');
  document.getElementById('m-file-name').textContent = file.name;
  document.getElementById('m-body').value = content;
  if (!titleEl.value.trim()) titleEl.value = titleFromFile(file.name, content);
});

document.getElementById('m-image-btn').addEventListener('click', () => {
  document.getElementById('m-image').click();
});
document.getElementById('m-image').addEventListener('change', e => {
  insertImageIntoTextarea(e.target.files[0], 'm-body');
  e.target.value = '';
});
document.getElementById('note-image-btn').addEventListener('click', () => {
  document.getElementById('note-image').click();
});
document.getElementById('note-image').addEventListener('change', e => {
  insertImageIntoTextarea(e.target.files[0], 'note-edit-body');
  e.target.value = '';
});

document.getElementById('m-link-add').addEventListener('click', addModalLinkFromInput);
document.getElementById('m-link-combo').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    addModalLinkFromInput();
  }
});

document.getElementById('m-save').addEventListener('click', async () => {
  const title   = document.getElementById('m-title').value.trim();
  const tag     = document.getElementById('m-tag').value.trim();
  const content = document.getElementById('m-body').value.trim();
  if (!title) return;

  const { data: inserted, error } = await sb.from('nodes').insert({
    title, tag, content, author_code: currentUser.code
  }).select().single();

  if (!error && modalLinks.length) {
    const validTargets = modalLinks.filter(t => nodes.find(n => n.title === t));
    if (validTargets.length) {
      await sb.from('edges').insert(
        validTargets.map(t => ({ source: title, target: t, label: '' }))
      );
    }
  }

  closeAddModal();
});

function renderNodeTitleOptions() {
  const list = document.getElementById('node-title-options');
  if (!list) return;
  list.innerHTML = nodes
    .map(n => `<option value="${escapeHtml(n.title)}"></option>`)
    .join('');
}

function addModalLinkFromInput() {
  const input = document.getElementById('m-link-combo');
  const title = input.value.trim();
  if (!title) return;
  const node = nodes.find(n => n.title.toLocaleLowerCase('tr') === title.toLocaleLowerCase('tr'));
  if (!node || modalLinks.includes(node.title)) {
    input.value = '';
    return;
  }
  modalLinks.push(node.title);
  input.value = '';
  renderSelectedLinks();
}

function renderSelectedLinks() {
  const box = document.getElementById('m-selected-links');
  box.innerHTML = modalLinks.map(title => `
    <span class="selected-link">
      <span>${escapeHtml(title)}</span>
      <button type="button" onclick="removeModalLink(${escapeHtml(JSON.stringify(title))})">×</button>
    </span>
  `).join('');
}

window.removeModalLink = function(title) {
  modalLinks = modalLinks.filter(t => t !== title);
  renderSelectedLinks();
};

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('show');
  ['m-title','m-tag','m-link-combo','m-body'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('m-file').value = '';
  document.getElementById('m-file-name').textContent = '';
  modalLinks = [];
  renderSelectedLinks();
}

function titleFromFile(filename, content) {
  const heading = content.match(/^#\s+(.+)$/m);
  if (heading) return heading[1].trim();
  return filename.replace(/\.(md|markdown)$/i, '').replace(/[-_]+/g, ' ').trim();
}

function insertAtCursor(textarea, text) {
  const start = textarea.selectionStart ?? textarea.value.length;
  const end = textarea.selectionEnd ?? textarea.value.length;
  textarea.value = textarea.value.slice(0, start) + text + textarea.value.slice(end);
  textarea.selectionStart = textarea.selectionEnd = start + text.length;
  textarea.focus();
}

function insertImageIntoTextarea(file, textareaId) {
  if (!file) return;
  if (!file.type.startsWith('image/')) {
    alert('Lütfen bir görsel dosyası seç.');
    return;
  }
  if (file.size > 1_500_000) {
    alert('Görsel çok büyük. Şimdilik 1.5 MB altı bir görsel seç.');
    return;
  }

  const reader = new FileReader();
  reader.onload = () => {
    const textarea = document.getElementById(textareaId);
    const alt = file.name.replace(/\.[^.]+$/, '').replace(/[-_]+/g, ' ');
    insertAtCursor(textarea, `\n![${alt}](${reader.result})\n`);
  };
  reader.readAsDataURL(file);
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}

// ── DELETE NODE ──────────────────────────────────────────
window.deleteNode = async function(id, title) {
  if (!confirm(`"${title}" silinsin mi?`)) return;
  await sb.from('edges').delete().or(`source.eq.${title},target.eq.${title}`);
  await sb.from('nodes').delete().eq('id', id);
  closePanel();
};

</script>
